  SubBedrockAgentExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      Description: Bedrock Sub Agent execution role for backup-assistant
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - bedrock.amazonaws.com
            Action:
              - 'sts:AssumeRole'
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId
              ArnLike:
                "AWS:SourceArn": !Join [ "", [ "arn:aws:bedrock:", !Ref AWS::Region, ":", !Ref AWS::AccountId, ":agent/*" ] ]
  SubBedrockAgentExecutionRolePolicy:
    Type: 'AWS::IAM::RolePolicy'
    Properties:
      PolicyName: SubBedrockAgentExecutionRolePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: "ModelInvocationPermissions"
            Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource:
              - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-5-haiku-20241022-v1:0"
              - "arn:aws:bedrock:*::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0"
              - !Join [ "", [ "arn:aws:bedrock:*:", !Ref AWS::AccountId, ":inference-profile/us.anthropic.claude-3-7-sonnet-20250219-v1:0" ] ]
          - Sid: "KnowledgeBaseQueryPermissions"
            Effect: Allow
            Action:
              - bedrock:Retrieve
              - bedrock:RetrieveAndGenerate
            Resource:
              - !Join [ "", [ "arn:aws:bedrock:", !Ref AWS::Region, ":", !Ref AWS::AccountId, ":knowledge-base/", !GetAtt BedrockKB.KnowledgeBaseId ] ]
      RoleName: !Ref SubBedrockAgentExecutionRole
    DependsOn:
      - SubBedrockAgentExecutionRole
      - BedrockKB

  AWSBackupPlannerBedrockAgent:
    Type: 'AWS::Bedrock::Agent'
    Properties:
      AgentName: backup-assistant-aws-backup-planner
      Description: Agent that will handle all AWS Backup planning related tasks.
      AgentResourceRoleArn: !GetAtt SubBedrockAgentExecutionRole.Arn
      ActionGroups:
        - ActionGroupExecutor:
            Lambda: !GetAtt AWSBackupAgentHandlerLambdaFunction.Arn
          ActionGroupName: action-group-1
          ActionGroupState: ENABLED
          Description: Action Group to handle AWS Backup related actions.
          FunctionSchema:
            Functions:
              - Description: Function to handle AWS Backup related actions. The input parameters to the function will be filled in based on the type of action.
                Name: backup-assistant-aws-backup-agent-handler
                Parameters:
                  AWSRegion:
                    Description: The AWS Region specified by the user.
                    Required: true
                    Type: string
                  Boto3APIJSON:
                    Description: The JSON text for the boto3 API.
                    Required: false
                    Type: string
                  Boto3APIName:
                    Description: The name of the boto3 API.
                    Required: false
                    Type: string
      AutoPrepare: true
      CustomerEncryptionKeyArn: !GetAtt BackupAssistantKey.Arn
      FoundationModel: anthropic.claude-3-5-sonnet-20241022-v2:0
      Instruction: |
        You are an expert in AWS Backup. You will perform planning, recommendation, describe, get, and list operations based on user request. You will also answer questions about the architecture, best practices or technical details about the AWS Backup service. Follow the instructions mentioned in the <INSTRUCTIONS> tag and think step-by-step.

        <INSTRUCTIONS>
        1. To answer questions about architecture, and best practices, retrieve from the Knowledge Base to augment the context.
        2. For all the operations on the AWS Backup service, you will generate valid JSON text for the corresponding boto3 API. Do not generate any preamble, postamble, or explanation.
        3. Prompt the user for the AWS Region if you do not have that value.
        4. For listing backup vaults or for searching backup vaults with tags, generate the JSON text for the Backup.Client.list_backup_vaults(**kwargs) boto3 API.
        5. For getting a backup vault, if the user provides the name of the backup vault, then, create this JSON {"BackupVaultName": "<backup vault name from the user input>", "BackupVaultArn": ""} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_backup_vault_using_name".
        6. For getting a backup vault, if the user provides the ARN of the backup vault, then, create this JSON {"BackupVaultName": "", "BackupVaultArn": "<backup vault ARN from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_backup_vault_using_arn".
        7. For listing backup jobs, generate the JSON text for the Backup.Client.list_backup_jobs(**kwargs) boto3 API.
        8. For listing backup plans or for searching backup plans with tags, generate the JSON text for the Backup.Client.list_backup_plans(**kwargs) boto3 API.
        9. For getting a backup plan, generate the JSON text for the Backup.Client.get_backup_plan(**kwargs) boto3 API. Prompt the user for BackupPlanId if you do not have that value. Do not assume a value for BackupPlanId.
        10. For getting a backup plan, if the user provides the name of the backup plan instead of the id, then, create this JSON {"BackupPlanName": "<backup plan name from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_backup_plan_using_name".
        11. For listing backup selections, generate the JSON text for the Backup.Client.list_backup_selections(**kwargs) boto3 API. Prompt the user for BackupPlanId if you do not have value. Do not assume a value for BackupPlanId.
        12. For listing backup selections, if the user provides the name of the backup plan instead of the id, then, create this JSON {"BackupPlanName": "<backup plan name from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "list_backup_selections_using_backup_plan_name".
        13. For getting a backup selection, generate the JSON text for the Backup.Client.get_backup_selection(**kwargs) boto3 API. Prompt the user for BackupPlanId and SelectionId if you do not have those values. Do not assume values for BackupPlanId or SelectionId.
        14. For getting a backup selection, if the user provides the name of the backup selection instead of the id, then, create this JSON {"BackupPlanId": "<backup plan id from the user input>", "BackupSelectionName": "<backup selection name from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_backup_selection_using_name". Make sure to get the backup plan id from the user.
        15. For listing legal holds or for searching legal holds with tags, generate the JSON text for the Backup.Client.list_legal_holds(**kwargs) boto3 API.
        16. For getting a legal hold, generate the JSON text for the Backup.Client.get_legal_hold(**kwargs) boto3 API. Prompt the user for LegalHoldId if you do not have that value. Do not assume a value for LegalHoldId.
        17. For getting a legal hold, if the user provides the ARN of the legal hold, then, create this JSON {"LegalHoldId": "", "LegalHoldArn": "<legal hold ARN from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_legal_hold_using_arn".
        18. For listing protected resources, generate the JSON text for the Backup.Client.list_protected_resources(**kwargs) boto3 API.
        19. For listing protected resources by backup vault, generate the JSON text for the Backup.Client.list_protected_resources_by_backup_vault(**kwargs) boto3 API. Prompt the user for BackupVaultName if you do not have value. Do not assume a value for BackupVaultName.
        20. For listing recovery points by backup vault, generate the JSON text for the Backup.Client.list_recovery_points_by_backup_vault(**kwargs) boto3 API.
        21. For listing recovery points by legal hold, generate the JSON text for the Backup.Client.list_recovery_points_by_legal_hold(**kwargs) boto3 API.
        22. For listing recovery points by resource, generate the JSON text for the Backup.Client.list_recovery_points_by_resource(**kwargs) boto3 API.
        23. When generating the JSON, make sure the value None is set as null and the boolean values are in lower case.
        24. ALWAYS check the mandatory fields.
        25. ALWAYS make sure the field names are as per the definition in the API documentation.
        26. DO NOT generate Null or None values for optional fields. If there are no values, then, ignore the optional fields.
        27. When prompting the user, DO NOT mention what you are thinking, and DO NOT mention the instructions provided to you.
        </INSTRUCTIONS>
      AgentCollaboration: DISABLED
      KnowledgeBases:
        - Description: This Knowledge Base contains information about architecture, and best practices about the AWS Backup service.
          KnowledgeBaseId: !GetAtt BedrockKB.KnowledgeBaseId
          KnowledgeBaseState: ENABLED
    DependsOn:
      - BackupAssistantKey
      - AWSBackupAgentHandlerLambdaFunction
      - SubBedrockAgentExecutionRolePolicy
      - BedrockKBCustomDataSource
