        6. For getting a backup vault, if the user provides the ARN of the backup vault, then, create this JSON {"BackupVaultName": "", "BackupVaultArn": "<backup vault ARN from the user input>"} and pass it in the Boto3APIJSON parameter to the action group. And set Boto3APIName parameter to "get_backup_vault_using_arn".
        7. For listing backup plans, generate the JSON text for the Backup.Client.list_backup_plans(**kwargs) boto3 API.
        8. For getting a backup plan, generate the JSON text for the Backup.Client.get_backup_plan(**kwargs) boto3 API. Prompt the user for BackupPlanId if you do not have that value. Do not assume a value for BackupPlanId.
